<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VanailaChat - Ollama Local Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" />
</head>
<body>
  <a class="skip-link" href="#chatLog">Skip to Conversation</a>

  <div class="app-shell">
    <button
      id="sidebarBackdrop"
      class="sidebar-backdrop"
      type="button"
      aria-label="Close Chat Sidebar"
      hidden
    ></button>

    <aside id="sidebar" class="sidebar" aria-label="Chat History">
      <div class="sidebar-content">
        <div class="sidebar-panel">
          <div class="sidebar-brand">
            <p class="sidebar-eyebrow">Local Ollama Workspace</p>
            <h1 class="sidebar-product">VanailaChat</h1>
            <p class="sidebar-copy">Browse recent chats, jump back into context, and start a fresh thread fast.</p>
          </div>

          <div class="sidebar-actions">
            <button
              id="newChatBtn"
              class="btn btn-primary btn-block"
              type="button"
              aria-label="Start New Chat"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              New Chat
            </button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-heading">
            <div>
              <p class="section-eyebrow">Library</p>
              <h2 class="section-title">Recent Conversations</h2>
            </div>
            <span id="historyCount" class="section-meta">0 chats</span>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="app-header">
        <div class="header-main">
          <div class="header-title">
            <div class="title-stack">
              <p class="header-eyebrow">Local AI Assistant</p>
              <h2>VanailaChat</h2>
            </div>
          </div>

          <div class="header-summary">
            <div class="summary-pill">
              <span class="summary-label">Model</span>
              <span id="selectedModelText" class="summary-value">Loading…</span>
            </div>
            <div class="summary-pill">
              <span class="summary-label">Ollama</span>
              <span id="serverStatusText" class="summary-value">Checking…</span>
            </div>
            <button id="themeToggleBtn" class="icon-btn theme-toggle" type="button" aria-label="Toggle Dark Mode">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section class="chat-container">
        <div id="chatLog" class="chat-log" aria-live="polite" aria-label="Conversation"></div>
      </section>

      <footer class="app-footer">
        <form id="chatForm" class="chat-form">
          <div class="composer">
            <label class="composer-label" for="promptInput">Message</label>
            <div id="attachmentTray" class="attachment-tray" hidden></div>
            <textarea
              id="promptInput"
              class="textarea"
              name="prompt"
              placeholder="Ask for code, debugging help, or a quick explanation…"
              rows="3"
            ></textarea>

            <div class="composer-footer">
              <div class="chat-status" aria-live="polite">
                <span id="statusText" class="status-text">Ready</span>
              </div>

	              <div class="input-actions">
	                <div class="composer-model">
	                  <label for="modelSelect">Model</label>
	                  <select id="modelSelect" class="select composer-select" name="model">
	                    <option>Loading models…</option>
	                  </select>
	                </div>
	                <div class="composer-context" aria-live="polite">
	                  <label for="modelSelect">Context</label>
	                  <div class="context-status">
	                    <span id="contextWindowText" class="context-status__text">-- / --</span>
	                    <span class="context-status__meter" aria-hidden="true">
	                      <span id="contextWindowMeter" class="context-status__meter-fill"></span>
	                    </span>
	                  </div>
	                </div>
	                <button id="clearBtn" type="button" class="btn btn-secondary">
	                  Clear
	                </button>
	                <input type="file" id="fileInput" multiple accept=".txt,.md,.js,.py,.html,.css,.json,.csv,.log,.sh,.ts,.tsx,.jsx,.rs,.go,.cpp,.c,.h,.hpp,.java,.php" hidden>
	                <button id="attachBtn" type="button" class="btn btn-secondary icon-btn" aria-label="Attach File">
	                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
	                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
	                  </svg>
	                </button>
                <button id="sendBtn" type="submit" class="btn btn-primary">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                  Send
                </button>
              </div>
            </div>
          </div>
        </form>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
